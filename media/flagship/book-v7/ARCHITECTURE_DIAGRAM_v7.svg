<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <style>
      text { font-family: "Microsoft YaHei","PingFang SC",sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #e0e0e0; }
      .subtitle { font-size: 13px; fill: #888; }
      .chapter-title { font-size: 14px; font-weight: bold; fill: #e8e8e8; }
      .chapter-desc { font-size: 11px; fill: #999; }
      .node-label { font-size: 12px; fill: #ccc; text-anchor: middle; }
      .arrow-label { font-size: 10px; fill: #777; }
      rect.chapter { rx: 8; ry: 8; stroke-width: 1.5; }
      rect.core { rx: 12; ry: 12; stroke: #d4a574; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#1a1a2e"/>

