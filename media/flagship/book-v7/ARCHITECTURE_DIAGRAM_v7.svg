  <line x1="280" y1="260" x2="410" y2="340" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="260" x2="500" y2="310" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="720" y1="260" x2="590" y2="340" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

