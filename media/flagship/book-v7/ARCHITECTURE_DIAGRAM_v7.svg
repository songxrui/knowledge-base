  <rect x="60" y="420" width="880" height="55" rx="6" fill="#0f3460" stroke="#1a1a3e" stroke-width="0.5"/>
  <text x="500" y="445" text-anchor="middle" class="chapter-desc" font-size="12" fill="#888">
    证据基线: 130本名著 · 36本微读划线(2,018条) · JAMA/Lancet/Psychological Bulletin · S/A/B/C四级标记 · 5反共识四件套
  </text>
  <text x="500" y="465" text-anchor="middle" class="chapter-desc" font-size="11" fill="#666">
